repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: frontend-lint
        name: Frontend lint
        entry: pnpm lint
        language: system
        types: [ts, tsx]
        pass_filenames: false
      - id: frontend-type-check
        name: Frontend type check
        entry: pnpm type-check
        language: system
        types: [ts, tsx]
        pass_filenames: false
